<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Font Showcase</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Piedra&family=Special+Elite&display=swap" rel="stylesheet">

<style>
/* your button styles */
.fancy-btn {
  display: inline-block;
  padding: 15px 30px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #4c54af, #2E7D32);
  text-decoration: none;
  border-radius: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.fancy-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.3);
}

.fancy-btn:active {
  transform: scale(0.98);
}

/* rest of your styles... */
body {
  margin: 0;
  background: #5E7192;
}
</style>
</head>

<body>

<!-- Buttons -->
<div style="text-align:center; margin:20px;">
  <button class="fancy-btn" onclick="window.location.href='https://ethaneunlv.github.io/Javascript-Addition-Website/'">
    Visit Font Showcase
  </button>

  <button class="fancy-btn" onclick="window.location.href='https://ethaneunlv.github.io/Grid-Portfolio/'">
    Visit Portfolio
  </button>
</div>

<!-- Banner -->
<div>
  <img src="Wolf in Snow Banner.png" id="banner">
</div>

<h1>The Wolf in Sheep's Clothing</h1>

<!-- Hero section -->
<div id="hero">
  <img src="moeinium-ai-generated-9008297_1280.jpg" id="header">

  <h2>
    A Wolf found great difficulty in getting at the sheep...
  </h2>
</div>

</body>
</html>
