<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Wolf Site</title>

<link href="https://fonts.googleapis.com/css2?family=Piedra&family=Special+Elite&display=swap" rel="stylesheet">

<style>


.fancy-btn {
  display: inline-block;
  padding: 15px 30px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #4c54af, #2E7D32);
  text-decoration: none;
  border-radius: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  margin: 10px;
}

.fancy-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.3);
}


.button-container {
  text-align: center;
  margin: 20px 0;
}


body {
  margin: 0;
  background: #5E7192;
  text-align: center; 
}

h1 {
  font-family: Piedra;
  font-size: 40pt;
  text-shadow: 3px 3px 1px blue;
}

h2 {
  font-family: "Special Elite";
  max-width: 800px;
  margin: 20px auto;
  line-height: 1.6;
}

#banner, #header {
  max-width: 100%;
  height: auto;
}

</style>
</head>

<body>


<div class="button-container">
  <button class="fancy-btn" onclick="window.location.href='https://ethaneunlv.github.io/Javascript-Addition-Website/'">
    Visit Font Showcase
  </button>

  <button class="fancy-btn" onclick="window.location.href='https://ethaneunlv.github.io/Grid-Portfolio/'">
    Visit Portfolio
  </button>
</div>

<img src="Wolf in Snow Banner.png" id="banner">

<h1>The Wolf in Sheep's Clothing</h1>

<div id="hero">
  <img src="moeinium-ai-generated-9008297_1280.jpg" id="header">

  <h2>
    A Wolf found great difficulty in getting at the sheep owing to the vigilance of the shepherd...
  </h2>
</div>

</body>
</html>
